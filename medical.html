<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeseka Price | Medical Coding & 3D Modeling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .font-sleek {
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }
        .blue-accent {
            color: #2dd4bf;
        }
        .video-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid rgba(45, 212, 191, 0.3);
            box-shadow: 0 0 30px rgba(45, 212, 191, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
        }
        .return-btn {
            color: white;
            text-decoration: none;
            border: 1px solid #2dd4bf;
            padding: 15px 30px;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .return-btn:hover {
            background-color: #2dd4bf;
            color: #020617;
        }
    </style>
</head>
<body>

    <h1 class="font-sleek text-2xl md:text-3xl mb-2 text-center">Medical <span class="blue-accent">Coding</span></h1>
    <p class="text-[10px] tracking-[0.4em] uppercase text-slate-500 mb-8 text-center">EHR // Anatomy Visualization // 3D Slicer</p>

    <div class="video-container">
        <p class="text-[12px] tracking-[0.2em] text-teal-500/50 uppercase font-sleek">[ 3D Rotational Model Rendering... ]</p>
    </div>

    <a href="/index.html" class="return-btn">Return to Main Terminal</a>

</body>
</html>
